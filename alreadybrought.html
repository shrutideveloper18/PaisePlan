<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" , content="width=device-width,initial-scale=1">
    <title></title>
    <link rel="stylesheet" href="css/alreadyboughtcss.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=BBH+Bartle&family=Baloo+Bhai+2:wght@400..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Tagesschrift&display=swap" rel="stylesheet">

<style>

</style>

<body>
    <div class="content">
        <div class="form" autocomplete="off">
            <label for="productmonth">SELECT THE MONTH: </label>
            <select type="text" name="" id="productmonth">
                <option value="January">January</option>
                <option value="February">February</option>
                <option value="March">March</option>
                <option value="April">April</option>
                <option value="May">May</option>
                <option value="June">June</option>
                <option value="July">July</option>
                <option value="August">August</option>
                <option value="September">September</option>
                <option value="October">October</option>
                <option value="November">November</option>
                <option value="December">December</option>
            </select>
            <label for="nameofproduct">Name of product</label>
            <input id="nameofproduct" autocomplete="off">
            <label for="priceofproduct">Price of Product</label>
            <input type="text" id="priceofproduct">

        </div>
        <button class="btn liquid" id="done">
            <span >DONE</span>
        </button>
    </div>

    <script src="../js/alreadybought.js"></script>
</body>

</html>
