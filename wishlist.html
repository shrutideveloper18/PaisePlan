<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" , content="width=device-width,initial-scale=1">
    <title></title>
    <link rel="stylesheet" href="css/wishlistcss.css">
</head>
<style>


</style>

<body>
    <h1>WISHLIST</h1>
    <h2> <i>Plan your expenses before you spend</i></h2>
    <div class="content">
        <div class="wishlistplan">
            <div class="priority highpriority">
                <h1 class="priority-heading">High priority</h1>
                <div class="productrow"></div>
            </div>

    
        <div class="priority mediumpriority">
            <h1 class="priority-heading">Medium priority</h1>
            <div class="productrow"></div>
        </div>
        <div class="priority lowpriority">
            <h1 class="priority-heading">Low priority</h1>
            <div class="productrow"></div>
        </div>

    </div>
    <div class="userinput">

        <label for="productname">ENTER PRODUCT'S NAME</label>
        <INPUT id="productname" autocomplete="off"></INPUT>
        <label for="productprice">ENTER PRODUCT'S PRICE</label>
        <INPUT id="productprice" autocomplete="off"></INPUT>
        <label for="producturl">ENTER PRODUCT'S URL</label>
        <INPUT id="producturl" autocomplete="off"></INPUT>
        <label for="productpriority" autocomplete="off">ENTER PRODUCTS PRIORITY</label>
        <select name="" id="productpriority" aria-placeholder="weghrvh">

            <option value="high">HIGH</option>
            <option value="medium">MEDIUM</option>
            <option value="low">LOW</option>
        </select>
        <label for="productphoto">ENTER PRODUCT'S PHOTO</label>
        <INPUT id="productphoto" autocomplete="off"></INPUT>
        <button type="button" class="btn liquid" id="addproductbtn">
            ADD PRODUCT
        </button>

    </div>
    </div>
    <script src="../js/wishlist.js"></script>
</body>

</html>
