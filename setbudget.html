<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
       <meta name="viewport", content="width=device-width,initial-scale=1">
       <title></title>  
       <link rel="stylesheet" href="css/setbudgetcss.css"> 
    </head>
    
    <body>
        <div class="content">
            <h1>Set Budget </h1>
            <label for="budgetmonth">SELECT THE MONTH: </label>
            <select type="text" name="" id="budgetmonth">
                <option value="January">January</option>
                <option value="February">February</option>
                <option value="March">March</option>
                <option value="April">April</option>
                <option value="May">May</option>
                <option value="June">June</option>
                <option value="July">July</option>
                <option value="August">August</option>
                <option value="September">September</option>
                <option value="October">October</option>
                <option value="Novemeber">November</option>
                <option value="December">December</option>
            </select>
            <label for="budgetinput">ENTER THE AMOUNT:</label>
            <input type="number" id="budgetinput" autocomplete="off">
            <button class="btn liquid" id="setbudgetdone">
            <span>DONE</span>
        </button>
        </div>
        <script src="../js/budget.js"></script>
    </body>
</html>
